<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Northstar Studio logo v3</title>
  <desc id="desc">A refined typographic logo for Northstar Studio with an editorial wordmark and subtle north-star accent.</desc>
  <rect width="1600" height="900" fill="#F4EFE6"/>

  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Avenir Next, Helvetica Neue, Helvetica, Arial, sans-serif; }
      .mono { font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>

  <!-- Primary professional lockup -->
  <g transform="translate(172 266)">
    <text class="serif" x="0" y="0" fill="#0A0B0A" font-size="168" font-weight="500" letter-spacing="-9">Northstar</text>
    <path d="M887 -110L905 -36L980 -18L905 0L887 74L869 0L794 -18L869 -36L887 -110Z" fill="#0A0B0A"/>
    <g transform="translate(8 82)">
      <line x1="0" y1="0" x2="1168" y2="0" stroke="#BDB4A5" stroke-width="2"/>
      <text class="mono" x="0" y="66" fill="#0A0B0A" font-size="30" font-weight="600" letter-spacing="19">STUDIO</text>
      <text class="sans" x="0" y="124" fill="#726B5F" font-size="27" font-weight="500" letter-spacing="-.4">AI management for short-form creators</text>
    </g>
  </g>

  <!-- Dark usage -->
  <g transform="translate(172 650)">
    <rect x="0" y="0" width="430" height="112" fill="#0A0B0A"/>
    <text class="serif" x="31" y="56" fill="#F4EFE6" font-size="48" font-weight="500" letter-spacing="-2.7">Northstar</text>
    <path d="M296 22L301 43L322 48L301 53L296 74L291 53L270 48L291 43L296 22Z" fill="#D6FF5B"/>
    <text class="mono" x="33" y="84" fill="#D6FF5B" font-size="11" font-weight="600" letter-spacing="8">STUDIO</text>
  </g>

  <!-- Light usage -->
  <g transform="translate(652 650)">
    <rect x="0" y="0" width="430" height="112" fill="#F9F5ED" stroke="#D8D0C2"/>
    <text class="serif" x="31" y="56" fill="#0A0B0A" font-size="48" font-weight="500" letter-spacing="-2.7">Northstar</text>
    <path d="M296 22L301 43L322 48L301 53L296 74L291 53L270 48L291 43L296 22Z" fill="#0A0B0A"/>
    <text class="mono" x="33" y="84" fill="#53651F" font-size="11" font-weight="600" letter-spacing="8">STUDIO</text>
  </g>

  <!-- Profile monogram -->
  <g transform="translate(1130 650)">
    <rect x="0" y="0" width="112" height="112" fill="#0A0B0A"/>
    <text class="serif" x="56" y="61" fill="#F4EFE6" text-anchor="middle" font-size="42" font-weight="500" letter-spacing="-2">NS</text>
    <path d="M56 73L60 86L74 90L60 94L56 107L52 94L38 90L52 86L56 73Z" fill="#D6FF5B"/>
  </g>
</svg>
