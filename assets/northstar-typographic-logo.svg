<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Northstar Studio House typographic logo</title>
  <desc id="desc">A professional text-only typographic logo for Northstar Studio House.</desc>
  <rect width="1600" height="900" fill="#070807"/>

  <defs>
    <linearGradient id="subtle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#D7D0C2"/>
    </linearGradient>
  </defs>

  <!-- Primary lockup -->
  <g transform="translate(190 270)">
    <text x="0" y="0"
      fill="url(#subtle)"
      font-family="Avenir Next, Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="142"
      font-weight="800"
      letter-spacing="-10">Northstar</text>

    <g transform="translate(8 84)">
      <line x1="0" y1="0" x2="1180" y2="0" stroke="#2D3029" stroke-width="2"/>
      <text x="0" y="70"
        fill="#D7FF57"
        font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="32"
        font-weight="500"
        letter-spacing="18">STUDIO HOUSE</text>
    </g>
  </g>

  <!-- Small-use variants -->
  <g transform="translate(190 640)">
    <rect x="0" y="0" width="420" height="108" fill="#10110F" stroke="#272A24"/>
    <text x="31" y="54" fill="#F7F2E8" font-family="Avenir Next, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="43" font-weight="800" letter-spacing="-3">Northstar</text>
    <text x="34" y="82" fill="#D7FF57" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="6.5">STUDIO HOUSE</text>
  </g>

  <g transform="translate(680 640)">
    <rect x="0" y="0" width="420" height="108" fill="#F7F2E8"/>
    <text x="31" y="54" fill="#070807" font-family="Avenir Next, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="43" font-weight="800" letter-spacing="-3">Northstar</text>
    <text x="34" y="82" fill="#53681F" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="6.5">STUDIO HOUSE</text>
  </g>

  <g transform="translate(1170 640)">
    <rect x="0" y="0" width="220" height="108" fill="#D7FF57"/>
    <text x="28" y="56" fill="#070807" font-family="Avenir Next, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="38" font-weight="850" letter-spacing="-3">NSH</text>
    <line x1="30" y1="72" x2="190" y2="72" stroke="#070807" stroke-width="2"/>
    <text x="31" y="91" fill="#070807" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="8" font-weight="700" letter-spacing="4">STUDIO HOUSE</text>
  </g>
</svg>
